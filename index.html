<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chá de Fraldas do Vicente</title>
<style>
  body {
    margin: 0;
    padding: 0;
    background-color: #f0f0f0;
    display: flex;
    justify-content: center;
    font-family: Arial, sans-serif;
  }

  /* Contêiner Mobile 9:16 */
  .landing-container {
    position: relative;
    width: 100%;
    max-width: 450px; /* Limite para não ficar gigante em telas de PC */
    aspect-ratio: 9 / 16;
    background-image: url('./convite_vicente.png');
    background-size: cover;
    background-position: center;
    box-shadow: 0 0 15px rgba(0,0,0,0.2);
    overflow: hidden;
  }

  /* Áreas Clicáveis Invisíveis */
  .overlay-btn {
    position: absolute;
    background: rgba(0, 0, 0, 0); /* Mude o último 0 para 0.3 se quiser ver onde a caixa está para ajustar a posição */
    border: none;
    cursor: pointer;
    z-index: 10;
  }

  /* Ajuste top, left, width e height conforme a exata posição na sua imagem */
  .btn-confirm-overlay {
    top: 64%;
    left: 10%;
    width: 60%;
    height: 8%;
    border-radius: 20px;
  }

  .address-overlay {
    top: 73%;
    left: 10%;
    width: 70%;
    height: 10%;
    display: block;
  }

  /* Modal */
  .modal {
    display: none;
    position: fixed;
    z-index: 100;
    left: 0;
    top: 0;
    width: 100%;
    height: 100%;
    background-color: rgba(0,0,0,0.6);
    justify-content: center;
    align-items: center;
  }

  .modal-content {
    background-color: #fff;
    padding: 30px;
    border-radius: 15px;
    width: 85%;
    max-width: 350px;
    text-align: center;
    position: relative;
  }

  .close-btn {
    position: absolute;
    top: 10px;
    right: 15px;
    font-size: 24px;
    cursor: pointer;
    color: #666;
  }

  input[type="text"], input[type="email"] {
    width: 90%;
    padding: 12px;
    margin: 10px 0;
    border: 1px solid #ccc;
    border-radius: 8px;
    font-size: 16px;
  }

  .submit-btn {
    background-color: #5c8ebd;
    color: white;
    border: none;
    padding: 12px 20px;
    border-radius: 8px;
    font-size: 16px;
    cursor: pointer;
    width: 100%;
    margin-top: 10px;
  }
  
  .submit-btn:disabled {
    background-color: #999;
  }

  #form-msg {
    margin-top: 15px;
    font-size: 14px;
  }
</style>
</head>
<body>

<div class="landing-container">
  <button class="overlay-btn btn-confirm-overlay" onclick="openModal()"></button>

  <a href="https://maps.app.goo.gl/Qg6UPMz1A3KpCEU36" target="_blank" class="overlay-btn address-overlay"></a>
</div>

<div id="rsvp-modal" class="modal">
  <div class="modal-content">
    <span class="close-btn" onclick="closeModal()">&times;</span>
    <h2 style="color: #5c8ebd; margin-top: 0;">Confirmar Presença</h2>
    <form id="rsvp-form">
      <input type="text" id="guest-name" placeholder="Seu nome completo" required>
      <input type="email" id="guest-email" placeholder="Seu e-mail" required>
      <button type="submit" class="submit-btn" id="submit-btn">Enviar Confirmação</button>
    </form>
    <div id="form-msg"></div>
  </div>
</div>

<script>
  const scriptURL = 'https://script.google.com/macros/s/AKfycbzEQ-A02vcnqJQnFSiPgeJ5UNAv9k1rnosx81TgiuIHvRE0aZidqbMllFty3zMAY0g3/exec';
  const modal = document.getElementById('rsvp-modal');
  const form = document.getElementById('rsvp-form');
  const msg = document.getElementById('form-msg');
  const submitBtn = document.getElementById('submit-btn');

  function openModal() {
    modal.style.display = 'flex';
  }

  function closeModal() {
    modal.style.display = 'none';
    form.reset();
    msg.innerText = '';
  }

  // Fecha clicando fora
  window.onclick = function(event) {
    if (event.target == modal) closeModal();
  }

  form.addEventListener('submit', e => {
    e.preventDefault();
    submitBtn.innerText = 'Enviando...';
    submitBtn.disabled = true;

    const data = {
      name: document.getElementById('guest-name').value,
      email: document.getElementById('guest-email').value
    };

    fetch(scriptURL, {
      method: 'POST',
      body: JSON.stringify(data),
      headers: { 'Content-Type': 'text/plain;charset=utf-8' } // text/plain evita bloqueio restrito de preflight do CORS no Apps Script
    })
    .then(response => response.json())
    .then(data => {
      msg.style.color = "green";
      msg.innerText = "Presença confirmada! Verifique seu e-mail.";
      setTimeout(closeModal, 3000);
    })
    .catch(error => {
      msg.style.color = "red";
      msg.innerText = "Erro ao enviar. Tente novamente.";
    })
    .finally(() => {
      submitBtn.innerText = 'Enviar Confirmação';
      submitBtn.disabled = false;
    });
  });
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chá de Fraldas do Vicente</title>
<style>
  body {
    margin: 0;
    padding: 0;
    background-color: #e0e6eb; /* Uma cor de fundo suave fora do mobile container */
    display: flex;
    justify-content: center;
    align-items: center;
    font-family: Arial, sans-serif;
    min-height: 100vh;
  }

  /* Contêiner Mobile 9:16 responsivo */
  .landing-container {
    position: relative;
    width: 100%;
    max-width: 450px; /* Limite para não ficar gigante em telas de PC */
    aspect-ratio: 9 / 16;
    /* --- ALTERAÇÃO IMPORTANTE PARA GITHUB PAGES --- */
    background-image: url('convite_vicente.png'); /* Nome exato do arquivo da sua imagem */
    /* ----------------------------------------------- */
    background-size: cover;
    background-position: center;
    box-shadow: 0 10px 25px rgba(0,0,0,0.15);
    overflow: hidden;
  }

  /* Áreas Clicáveis Invisíveis (Onde faremos o efeito hover) */
  .overlay-btn {
    position: absolute;
    /* Começa invisível, mas transparente para o fundo */
    background: rgba(255, 255, 255, 0); 
    border: none;
    cursor: pointer;
    z-index: 10;
    
    /* CONFIGURAÇÃO DE TRANSIÇÃO PARA O EFEITO HOVER (SUTIL) */
    transition: transform 0.3s ease, box-shadow 0.3s ease, background 0.3s ease;
    transform: scale(1); /* Ponto de partida para o zoom */
  }

  /* --- EFEITO HOVER SUTIL (Zoom e Brilho) --- */
  .overlay-btn:hover {
    /* 1. Efeito de Zoom (sutil: 1.05 = 5% maior) */
    transform: scale(1.05); 
    
    /* 2. Efeito de Brilho (uma sombra branca suave) */
    box-shadow: 0 0 20px 5px rgba(255, 255, 255, 0.7); 
    
    /* 3. Um leve realce de cor (opcional, para dar profundidade) */
    background: rgba(255, 255, 255, 0.1); 
  }

  /* Posicionamento exato na imagem (ajuste se necessário) */
  .btn-confirm-overlay {
    top: 66.8%; /* Início da área do balão */
    left: 17%;
    width: 40%; /* Cobrindo todo o balão */
    height: 8%;
    border-radius: 20px; /* Mantém a forma redonda do balão no hover */
  }

  .address-overlay {
    top: 75.8%; /* Início da área do texto do endereço */
    left: 15%;
    width: 42%;
    height: 7%;
    border-radius: 10px; /* Arredondamento suave no hover para o texto */
    display: block; /* Para o link se comportar como um bloco */
  }

  /* Estilização do Modal (Inalterado) */
  .modal {
    display: none;
    position: fixed;
    z-index: 100;
    left: 0;
    top: 0;
    width: 100%;
    height: 100%;
    background-color: rgba(0,0,0,0.6);
    justify-content: center;
    align-items: center;
  }

  .modal-content {
    background-color: #fff;
    padding: 30px;
    border-radius: 15px;
    width: 85%;
    max-width: 350px;
    text-align: center;
    position: relative;
    box-shadow: 0 5px 20px rgba(0,0,0,0.2);
  }

  .close-btn {
    position: absolute;
    top: 10px;
    right: 15px;
    font-size: 24px;
    cursor: pointer;
    color: #666;
  }

  input[type="text"], input[type="email"] {
    width: 90%;
    padding: 12px;
    margin: 10px 0;
    border: 1px solid #ccc;
    border-radius: 8px;
    font-size: 16px;
    outline: none;
    transition: border-color 0.3s ease;
  }

  input[type="text"]:focus, input[type="email"]:focus {
    border-color: #5c8ebd;
  }

  .submit-btn {
    background-color: #5c8ebd;
    color: white;
    border: none;
    padding: 12px 20px;
    border-radius: 8px;
    font-size: 16px;
    cursor: pointer;
    width: 100%;
    margin-top: 10px;
    transition: background-color 0.3s ease;
  }

  .submit-btn:hover {
    background-color: #4a759e;
  }
  
  .submit-btn:disabled {
    background-color: #999;
    cursor: not-allowed;
  }

  #form-msg {
    margin-top: 15px;
    font-size: 14px;
    min-height: 20px;
  }
</style>
</head>
<body>

<div class="landing-container">
  <button class="overlay-btn btn-confirm-overlay" onclick="openModal()"></button>

  <a href="https://maps.app.goo.gl/RsZjk8qoahGA6cKA8" target="_blank" class="overlay-btn address-overlay"></a>
</div>

<div id="rsvp-modal" class="modal">
  <div class="modal-content">
    <span class="close-btn" onclick="closeModal()">×</span>
    <h2 style="color: #5c8ebd; margin-top: 0;">Confirmar Presença</h2>
    <p style="color: #666; font-size: 14px; margin-bottom: 20px;">Estamos ansiosos para ver você!</p>
    <form id="rsvp-form">
      <input type="text" id="guest-name" placeholder="Seu nome completo" required>
      <input type="email" id="guest-email" placeholder="Seu e-mail" required>
      <button type="submit" class="submit-btn" id="submit-btn">Enviar Confirmação</button>
    </form>
    <div id="form-msg"></div>
  </div>
</div>

<script>
  /* --- COLE AQUI O SEU URL DO WEB APP --- */
  const scriptURL = 'https://script.google.com/macros/s/AKfycbzEQ-A02vcnqJQnFSiPgeJ5UNAv9k1rnosx81TgiuIHvRE0aZidqbMllFty3zMAY0g3/exec';
  /* ------------------------------------ */
  
  const modal = document.getElementById('rsvp-modal');
  const form = document.getElementById('rsvp-form');
  const msg = document.getElementById('form-msg');
  const submitBtn = document.getElementById('submit-btn');

  function openModal() {
    modal.style.display = 'flex';
  }

  function closeModal() {
    modal.style.display = 'none';
    form.reset();
    msg.innerText = '';
  }

  // Fecha o modal clicando fora da caixa
  window.onclick = function(event) {
    if (event.target == modal) closeModal();
  }

  // Lógica de envio (Inalterada)
  form.addEventListener('submit', e => {
    e.preventDefault();
    submitBtn.innerText = 'Enviando...';
    submitBtn.disabled = true;
    msg.style.color = "#666";
    msg.innerText = "Processando sua confirmação...";

    const data = {
      name: document.getElementById('guest-name').value,
      email: document.getElementById('guest-email').value
    };

    fetch(scriptURL, {
      method: 'POST',
      body: JSON.stringify(data),
      headers: { 'Content-Type': 'text/plain;charset=utf-8' }
    })
    .then(response => response.json())
    .then(data => {
      msg.style.color = "green";
      msg.innerText = "Presença confirmada! Verifique seu e-mail.";
      setTimeout(closeModal, 3500); // Fecha automaticamente após 3.5 segundos
    })
    .catch(error => {
      console.error('Erro:', error);
      msg.style.color = "red";
      msg.innerText = "Ocorreu um erro ao enviar. Tente novamente.";
    })
    .finally(() => {
      submitBtn.innerText = 'Enviar Confirmação';
      submitBtn.disabled = false;
    });
  });
</script>

</body>
</html>
